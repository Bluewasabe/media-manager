<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Manager | JARVIS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0A0F1E;
      --card-bg: rgba(255,255,255,0.03);
      --text-primary: #F0F4FF;
      --text-secondary: #8892A4;
      --text-muted: #4A5568;
      --cyan: #00D4FF;
      --green: #00FF88;
      --amber: #FFB800;
      --purple: #AA44FF;
      --pink: #FF44AA;
      --blue: #4488FF;
      --red: #FF4444;
      --border: rgba(255,255,255,0.06);
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
    }

    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridPulse 8s ease-in-out infinite;
    }

    @keyframes gridPulse { 0%,100% { opacity: 0.5 } 50% { opacity: 1 } }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; }
    .orb-tl { width: 400px; height: 400px; top: -100px; left: -100px; background: radial-gradient(circle, rgba(170,68,255,0.15), transparent); }
    .orb-br { width: 500px; height: 500px; bottom: -150px; right: -150px; background: radial-gradient(circle, rgba(0,212,255,0.12), transparent); }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover { border-color: rgba(0,212,255,0.15); box-shadow: 0 0 20px rgba(0,212,255,0.05); }
    .card-glow-cyan { box-shadow: 0 0 30px rgba(0,212,255,0.1); }
    .card-glow-green { box-shadow: 0 0 30px rgba(0,255,136,0.1); }
    .card-glow-purple { box-shadow: 0 0 30px rgba(170,68,255,0.1); }

    .nav-tab {
      padding: 6px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
      border: 1px solid transparent; user-select: none;
    }
    .nav-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .nav-tab.active { color: var(--cyan); background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); }
    .nav-tab-indicator { position: relative; }
    .nav-tab-indicator::after {
      content: '';
      position: absolute;
      top: 2px; right: 2px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }

    .pill { padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; display: inline-block; }
    .pill-running { background: rgba(0,212,255,0.15); color: var(--cyan); border: 1px solid rgba(0,212,255,0.3); }
    .pill-completed { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
    .pill-failed { background: rgba(255,68,68,0.15); color: var(--red); border: 1px solid rgba(255,68,68,0.3); }
    .pill-cancelled { background: rgba(255,184,0,0.15); color: var(--amber); border: 1px solid rgba(255,184,0,0.3); }
    .pill-interrupted { background: rgba(255,184,0,0.15); color: var(--amber); border: 1px solid rgba(255,184,0,0.3); }
    .pill-pending { background: rgba(136,146,164,0.15); color: var(--text-secondary); border: 1px solid rgba(136,146,164,0.3); }

    .level-INFO { color: var(--text-secondary); }
    .level-WARN { color: var(--amber); }
    .level-ERROR { color: var(--red); }
    .level-DRY { color: var(--purple); }

    .form-input {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--text-primary);
      font-size: 0.85rem; transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .form-input:focus { outline: none; border-color: rgba(0,212,255,0.4); box-shadow: 0 0 0 2px rgba(0,212,255,0.1); }
    .form-input::placeholder { color: var(--text-muted); }
    select.form-input option { background: #0A0F1E; }

    .btn-primary { background: linear-gradient(135deg, var(--purple), var(--pink)); color: white; border: none; border-radius: 8px; padding: 8px 20px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; font-size: 0.85rem; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-execute { background: linear-gradient(135deg, #FF4444, #FF8800); }
    .btn-secondary { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-primary); border-radius: 8px; padding: 8px 16px; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .btn-danger { background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.3); color: var(--red); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 0.8rem; }
    .btn-danger:hover { background: rgba(255,68,68,0.25); }
    .btn-icon { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; font-size: 0.8rem; }
    .btn-icon:hover { color: var(--text-primary); background: rgba(255,255,255,0.08); }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; border-radius: 6px; }

    .toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .toggle input { display: none; }
    .toggle-track { width: 40px; height: 22px; background: rgba(255,255,255,0.1); border-radius: 11px; position: relative; transition: background 0.2s; border: 1px solid var(--border); flex-shrink: 0; }
    .toggle input:checked ~ .toggle-track { background: rgba(0,212,255,0.3); border-color: rgba(0,212,255,0.5); }
    .toggle-thumb { width: 16px; height: 16px; background: var(--text-secondary); border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
    .toggle input:checked ~ .toggle-track .toggle-thumb { transform: translateX(18px); background: var(--cyan); }

    .exec-toggle { display: flex; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
    .exec-toggle button { flex: 1; padding: 8px 16px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; transition: all 0.2s; }
    .exec-toggle button.active-dryrun { background: rgba(170,68,255,0.2); color: var(--purple); }
    .exec-toggle button.active-execute { background: rgba(255,68,68,0.2); color: var(--red); }

    .seg-btn { display: flex; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
    .seg-btn button { flex: 1; padding: 7px 14px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
    .seg-btn button.active { background: rgba(0,212,255,0.15); color: var(--cyan); }
    .seg-btn button.active-amber { background: rgba(255,184,0,0.15); color: var(--amber); }
    .seg-btn button.active-red { background: rgba(255,68,68,0.15); color: var(--red); }
    .seg-btn button.active-green { background: rgba(0,255,136,0.15); color: var(--green); }

    .progress-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .progress-indeterminate .progress-fill { width: 40%; animation: progressPulse 1.5s ease-in-out infinite; background: linear-gradient(90deg, var(--cyan), var(--purple)); }
    @keyframes progressPulse { 0% { transform: translateX(-200%) } 100% { transform: translateX(400%) } }

    .phase-steps { display: flex; gap: 4px; align-items: center; }
    .phase-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: all 0.3s; flex-shrink: 0; }
    .phase-dot.active { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: phasePulse 1s ease-in-out infinite; }
    .phase-dot.done { background: var(--green); }
    .phase-dot.failed { background: var(--red); }
    @keyframes phasePulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.3) } }

    .browser-pane { height: 380px; overflow-y: auto; }
    .browser-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px; cursor: pointer; border-radius: 6px; transition: background 0.15s; font-size: 0.85rem; }
    .browser-item:hover { background: rgba(255,255,255,0.05); }
    .browser-item.selected { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); }
    .browser-item.dir { color: var(--text-primary); }
    .browser-item.file { color: var(--text-secondary); }
    .dir-icon { color: var(--amber); font-size: 1rem; }
    .file-icon { color: var(--text-muted); font-size: 0.9rem; }

    .drive-card { display: flex; flex-direction: column; padding: 10px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; gap: 4px; background: var(--card-bg); }
    .drive-card:hover { border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); }
    .drive-card.inaccessible { opacity: 0.4; cursor: not-allowed; }

    .log-line { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.75rem; padding: 2px 8px; border-radius: 2px; line-height: 1.6; }
    .log-line:hover { background: rgba(255,255,255,0.03); }
    .log-line.ERROR { background: rgba(255,68,68,0.05); border-left: 2px solid var(--red); padding-left: 6px; }
    .log-line.WARN { border-left: 2px solid var(--amber); padding-left: 6px; }
    .log-line.DRY { border-left: 2px solid var(--purple); padding-left: 6px; }

    .breadcrumb-item { color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; transition: color 0.15s; }
    .breadcrumb-item:hover { color: var(--cyan); }
    .breadcrumb-sep { color: var(--text-muted); margin: 0 4px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }

    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast-item { background: rgba(15,20,40,0.95); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; min-width: 280px; backdrop-filter: blur(20px); animation: toastIn 0.3s ease; }
    .toast-item.success { border-left: 3px solid var(--green); }
    .toast-item.error { border-left: 3px solid var(--red); }
    .toast-item.info { border-left: 3px solid var(--cyan); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px) } to { opacity: 1; transform: translateX(0) } }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    .source-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; }

    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }

    .stat-value { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); }

    .section-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); font-weight: 600; margin-bottom: 12px; }

    .online-badge { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.2); border-radius: 20px; font-size: 0.7rem; color: var(--green); }
    .offline-badge { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.2); border-radius: 20px; font-size: 0.7rem; color: var(--red); }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
    .pulse-dot-red { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: 0.5; transform: scale(0.8) } }

    .script-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em; flex-shrink: 0; }
    .script-icon-media { background: linear-gradient(135deg, rgba(0,212,255,0.3), rgba(0,212,255,0.1)); color: var(--cyan); border: 1px solid rgba(0,212,255,0.3); }
    .script-icon-drill { background: linear-gradient(135deg, rgba(170,68,255,0.3), rgba(170,68,255,0.1)); color: var(--purple); border: 1px solid rgba(170,68,255,0.3); }
    .script-icon-dupe { background: linear-gradient(135deg, rgba(0,255,136,0.3), rgba(0,255,136,0.1)); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }

    .config-panel { display: none; border-top: 1px solid var(--border); margin-top: 16px; padding-top: 16px; }
    .config-panel.open { display: block; }

    .usage-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-top: 4px; }
    .usage-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.3s; }

    .form-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; display: block; font-weight: 500; letter-spacing: 0.03em; }
    .form-row { display: flex; gap: 8px; align-items: flex-end; }
    .form-group { margin-bottom: 14px; }

    .checkbox-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; user-select: none; transition: all 0.15s; }
    .checkbox-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(0,212,255,0.2); }
    .checkbox-item input { display: none; }
    .checkbox-box { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; transition: all 0.15s; flex-shrink: 0; }
    .checkbox-item input:checked ~ .checkbox-box { background: rgba(0,212,255,0.25); border-color: var(--cyan); color: var(--cyan); }

    .warning-box { padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
    .warning-amber { background: rgba(255,184,0,0.08); border: 1px solid rgba(255,184,0,0.2); color: var(--amber); }
    .warning-red { background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.2); color: var(--red); }

    .job-active-card { animation: fadeIn 0.3s ease; }

    .live-log { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 8px; height: 160px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; }

    .hidden { display: none !important; }
    .tab-panel { }
  </style>
</head>
<body class="min-h-screen">
  <div class="grid-bg"></div>
  <div class="orb orb-tl"></div>
  <div class="orb orb-br"></div>

  <div class="relative z-10">
    <!-- Navigation -->
    <nav style="border-bottom: 1px solid var(--border); background: rgba(10,15,30,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 50;">
      <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div style="background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;color:white;flex-shrink:0">FM</div>
          <span style="font-weight:700;font-size:0.95rem;letter-spacing:0.15em;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent">FILE MANAGER</span>
          <span style="color:var(--text-muted);font-size:0.75rem">by JARVIS</span>
        </div>
        <div class="flex gap-1" id="nav-tabs"></div>
        <div id="api-status" class="online-badge">
          <div class="pulse-dot"></div>
          <span>Connected</span>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-7xl mx-auto px-6 py-6">
      <div id="tab-dashboard" class="tab-panel"></div>
      <div id="tab-scripts" class="tab-panel hidden"></div>
      <div id="tab-explorer" class="tab-panel hidden"></div>
      <div id="tab-jobs" class="tab-panel hidden"></div>
      <div id="tab-logs" class="tab-panel hidden"></div>
      <div id="tab-settings" class="tab-panel hidden"></div>
    </main>
  </div>

  <!-- File Browser Modal -->
  <div id="browser-modal" class="modal-overlay hidden">
    <div class="card" style="width:780px;max-height:90vh;display:flex;flex-direction:column;padding:0;overflow:hidden;">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div>
          <div style="font-weight:600;font-size:0.95rem;" id="browser-title">Browse Files</div>
          <div id="browser-breadcrumb" style="display:flex;align-items:center;flex-wrap:wrap;margin-top:6px;gap:2px;"></div>
        </div>
        <button onclick="closeBrowser()" class="btn-icon">✕</button>
      </div>
      <div id="browser-content" class="browser-pane" style="flex:1;padding:8px;"></div>
      <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:rgba(0,0,0,0.2);">
        <div style="flex:1;overflow:hidden;">
          <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:2px;">Selected path</div>
          <div id="browser-selected-path" style="font-size:0.8rem;color:var(--cyan);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">—</div>
        </div>
        <button onclick="browserSelectFolder()" class="btn-primary btn-sm" id="browser-select-btn">Select This Folder</button>
        <button onclick="closeBrowser()" class="btn-secondary btn-sm">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast" id="toast-container"></div>

<script>
// =====================================================================
// CONFIG & STATE
// =====================================================================
const TABS = ['dashboard', 'scripts', 'explorer', 'jobs', 'logs', 'settings'];
const TAB_LABELS = {
  dashboard: 'Dashboard',
  scripts: 'Scripts',
  explorer: 'Explorer',
  jobs: 'Jobs',
  logs: 'Logs',
  settings: 'Settings'
};
const SCRIPT_LABELS = {
  media_organizer: 'Media Organizer',
  disk_drill: 'Disk Drill Organizer',
  duplicate_finder: 'Duplicate Finder'
};

const state = {
  activeTab: 'dashboard',
  jobs: [],
  jobWS: {},
  jobLogs: {},
  jobStats: {},
  browserTarget: null,
  browserPath: null,
  browserCallback: null,
  drives: [],
  scriptExecMode: { media_organizer: false, disk_drill: false, duplicate_finder: false },
  dfSources: [],
  activeJobFilter: null,
  logsOffset: 0,
  activeJobs: new Set(),
};

// =====================================================================
// API CLIENT
// =====================================================================
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || 'API error');
  }
  return r.json();
}

// =====================================================================
// TOAST
// =====================================================================
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:1rem;${type==='success'?'color:var(--green)':type==='error'?'color:var(--red)':'color:var(--cyan)'}">${icon}</span>
      <span style="font-size:0.85rem;color:var(--text-primary)">${msg}</span>
    </div>`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(20px)';
    el.style.transition = 'all 0.3s';
    setTimeout(() => el.remove(), 300);
  }, 4000);
}

// =====================================================================
// UTILITIES
// =====================================================================
function containerToDisplay(path) {
  const DRIVES_DIR = '/mnt/drives';
  if (path && path.startsWith(DRIVES_DIR + '/')) {
    const rest = path.slice(DRIVES_DIR.length + 1);
    const idx = rest.indexOf('/');
    if (idx === -1) return rest.toUpperCase() + ':\\';
    const letter = rest.slice(0, idx).toUpperCase();
    const sub = rest.slice(idx + 1).replace(/\//g, '\\');
    return letter + ':\\' + sub;
  }
  return path;
}

function formatSize(bytes) {
  if (!bytes && bytes !== 0) return '—';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let n = bytes;
  for (const u of units) {
    if (n < 1024) return `${n.toFixed(1)} ${u}`;
    n /= 1024;
  }
  return `${n.toFixed(1)} PB`;
}

function fmtLogTime(iso) {
  if (!iso) return '—';
  return new Date(iso + 'Z').toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
}

function fmtLogDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'Z');
  return d.toLocaleDateString([], {month:'2-digit', day:'2-digit', year:'numeric'}) + ' ' +
         d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
}

function relativeTime(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso + 'Z').getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function statusPill(status) {
  return `<span class="pill pill-${status}">${status}</span>`;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function saveLS(key, val) {
  try { localStorage.setItem('fm_' + key, JSON.stringify(val)); } catch {}
}
function loadLS(key, def) {
  try {
    const v = localStorage.getItem('fm_' + key);
    return v !== null ? JSON.parse(v) : def;
  } catch { return def; }
}

function renderNav() {
  const container = document.getElementById('nav-tabs');
  const hasRunning = state.jobs.some(j => j.status === 'running' || j.status === 'pending');
  container.innerHTML = TABS.map(t => {
    const isActive = state.activeTab === t;
    const isJobs = t === 'jobs';
    const indicator = isJobs && hasRunning && !isActive ? ' nav-tab-indicator' : '';
    return `<div class="nav-tab${isActive ? ' active' : ''}${indicator}" onclick="switchTab('${t}')">${TAB_LABELS[t]}</div>`;
  }).join('');
}

function switchTab(tab) {
  const prev = document.getElementById('tab-' + state.activeTab);
  if (prev) prev.classList.add('hidden');
  state.activeTab = tab;
  saveLS('activeTab', tab);
  const next = document.getElementById('tab-' + tab);
  if (next) next.classList.remove('hidden');
  renderNav();
  renderTab(tab);
}

function renderTab(tab) {
  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'scripts') renderScripts();
  else if (tab === 'explorer') renderExplorer();
  else if (tab === 'jobs') renderJobs();
  else if (tab === 'logs') renderLogs();
  else if (tab === 'settings') renderSettings();
}

    panel.innerHTML = getConfigRenderer(id)();
    bindConfigEvents(id);
    saveLS('script_open_' + id, true);
  }
}

function bindConfigEvents(id) {
  const panel = document.getElementById('config-' + id);

  panel.querySelectorAll('[data-browse]').forEach(btn => {

    btn.onclick = () => openBrowser(target, multi ? 'df-add-source' : null);

function dfTypeChange() {
  const panel = document.getElementById('config-duplicate_finder');
  if (!panel) return;
  const allCb = panel.querySelector('[data-type="all"]');
  const otherCbs = Array.from(panel.querySelectorAll('[data-type]:not([data-type="all"])'));
  // If "all" was just clicked, uncheck others
  if (allCb && allCb.checked) {
    otherCbs.forEach(cb => { cb.checked = false; });
  } else {
    // If any specific checked, uncheck "all"
    if (allCb) allCb.checked = false;
  }
  // Update visual checkmarks
  panel.querySelectorAll('.checkbox-item').forEach(item => {
    const cb = item.querySelector('input[type="checkbox"]');
    const box = item.querySelector('.checkbox-box');
    if (box) box.textContent = cb.checked ? '✓' : '';
  });
}

function setDfAction(action) {
  const seg = document.getElementById('df-action-seg');
  if (!seg) return;
  seg.querySelectorAll('button').forEach(b => {
    b.className = b.getAttribute('data-val') === action
      ? (action === 'delete' ? 'active-red' : action === 'report' ? 'active-green' : 'active')
      : '';
  });
  const archiveRow = document.getElementById('df-archive-row');
  if (archiveRow) archiveRow.style.display = action === 'archive' ? '' : 'none';
  // Show/hide warning
  const existing = seg.parentElement.querySelector('.warning-box');
  if (existing) existing.remove();
  if (action === 'delete') {
    const w = document.createElement('div');
    w.className = 'warning-box warning-red';
    w.style.marginTop = '8px';
    w.textContent = '⚠ Delete is irreversible — duplicates will be permanently removed';
    seg.parentElement.appendChild(w);
  }
}

function dfRemoveSource(idx) {
  state.dfSources.splice(idx, 1);
  document.getElementById('df-sources-list').innerHTML = state.dfSources.length === 0
    ? `<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:0.82rem;">No sources added yet</div>`
    : state.dfSources.map((s, i) => `
      <div class="source-item">
        <span style="font-size:0.7rem;font-weight:700;color:var(--purple);min-width:20px">P${i+1}</span>
        <span style="flex:1;font-size:0.82rem;font-family:monospace;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(containerToDisplay(s))}</span>
        <button class="btn-icon btn-sm" onclick="dfRemoveSource(${i})">✕</button>
      </div>`).join('');
}

function setSegBtn(id, btn, val) {
  const seg = document.getElementById(id);
  if (!seg) return;
  seg.querySelectorAll('button').forEach(b => {
    b.className = b.getAttribute('data-val') === val ? 'active' : '';
  });
}

function setExecMode(script, execute) {
  state.scriptExecMode[script] = execute;
  // Re-render the config panel
  const panel = document.getElementById('config-' + script);
  if (panel && panel.classList.contains('open')) {
    panel.innerHTML = getConfigRenderer(script)();
    bindConfigEvents(script);
  }
}

function collectConfig(script) {
  if (script === 'media_organizer') {
    const modeSeg = document.getElementById('mo-mode-seg');
    const mode = modeSeg ? (modeSeg.querySelector('button.active')?.getAttribute('data-val') || 'movies') : 'movies';
    return {
      mode,
      path: document.getElementById('mo-path')?.value?.trim() || '',
      execute: state.scriptExecMode.media_organizer,
    };
  }
  if (script === 'disk_drill') {
    const opSeg = document.getElementById('dd-op-seg');
    const isMove = opSeg ? (opSeg.querySelector('button.active-amber')?.getAttribute('data-val') === 'move') : false;
    return {
      input_dir: document.getElementById('dd-input')?.value?.trim() || '',
      output_dir: document.getElementById('dd-output')?.value?.trim() || '',
      execute: state.scriptExecMode.disk_drill,
      move: isMove,
      include_filtered: document.getElementById('dd-include-filtered')?.checked || false,
      skip_video_meta: document.getElementById('dd-skip-video-meta')?.checked || false,
      min_photo_px: parseInt(document.getElementById('dd-min-photo')?.value || '800'),
      min_video_sec: parseInt(document.getElementById('dd-min-video')?.value || '30'),
      workers: parseInt(document.getElementById('dd-workers')?.value || '8'),
    };
  }
  if (script === 'duplicate_finder') {
    const actionSeg = document.getElementById('df-action-seg');
    const activeAction = actionSeg?.querySelector('button.active,button.active-red,button.active-green');
    const action = activeAction?.getAttribute('data-val') || 'archive';
    const hashSeg = document.getElementById('df-hash-seg');
    const hash = hashSeg?.querySelector('button.active')?.getAttribute('data-val') || 'sha256';
    const typeCbs = Array.from(document.querySelectorAll('#config-duplicate_finder [data-type]:checked')).map(c => c.getAttribute('data-type'));
    return {
      sources: [...state.dfSources],
      output: document.getElementById('df-output')?.value?.trim() || '',
      execute: state.scriptExecMode.duplicate_finder,
      action,
      archive: document.getElementById('df-archive')?.value?.trim() || '',
      types: typeCbs.length > 0 ? typeCbs : ['all'],
      perceptual: document.getElementById('df-perceptual')?.checked || false,
      skip_video_meta: document.getElementById('df-skip-video-meta')?.checked || false,
      hash,
      workers: parseInt(document.getElementById('df-workers')?.value || '8'),
      min_size: parseInt(document.getElementById('df-min-size')?.value || '4096'),
    };
  }
}

async function runScript(script) {
  const config = collectConfig(script);

  // Validation
  if (script === 'disk_drill') {
    if (!config.input_dir) { toast('Input directory is required', 'error'); return; }
    if (!config.output_dir) { toast('Output directory is required', 'error'); return; }
  }
  if (script === 'duplicate_finder') {
    if (!config.sources || config.sources.length === 0) { toast('At least one source directory is required', 'error'); return; }
    if (!config.output) { toast('Output directory is required', 'error'); return; }
  }

  // Save config to localStorage
  saveLS('cfg_' + script, config);

  try {
    const result = await api('/jobs', 'POST', { script, config });
    toast(`Job started: ${SCRIPT_LABELS[script]}`, 'success');
    // Navigate to jobs tab
    switchTab('jobs');
    // Auto-connect WS for the new job
    setTimeout(() => connectJobWS(result.job_id), 300);
  } catch (e) {
    toast('Failed to start job: ' + e.message, 'error');
  }
}

let explorerPath = null;

async function renderExplorer() {
  const el = document.getElementById('tab-explorer');
  el.innerHTML = `
    <div class="fade-in">
      <div style="margin-bottom:24px;">
        <h1 style="font-size:1.4rem;font-weight:700;margin:0 0 4px;">Explorer</h1>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin:0;">Browse your file system</p>
      </div>
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(0,0,0,0.2);">
          <button id="exp-back-btn" class="btn-icon" onclick="explorerGoUp()" ${explorerPath?'':'disabled'} style="${explorerPath?'':'opacity:0.3;cursor:not-allowed'}">← Back</button>
          <div id="exp-breadcrumb" style="display:flex;align-items:center;flex-wrap:wrap;flex:1;gap:2px;"></div>
          <button class="btn-icon" onclick="explorerRefresh()">↺ Refresh</button>
          <button class="btn-icon" onclick="explorerGoHome()">⌂ Drives</button>
        </div>
        <div id="exp-content" style="min-height:400px;padding:8px;"></div>
      </div>
    </div>`;

  if (explorerPath) {
    await explorerNavigate(explorerPath);
  } else {
    await explorerShowDrives();
  }
}

function groupDrivesByType(drives) {
  const order = ['Local', 'Network', 'Removable', 'CD-ROM', 'Unknown'];
  const groups = {};
  for (const d of drives) {
    const t = d.drive_type || 'Local';
    if (!groups[t]) groups[t] = [];
    groups[t].push(d);
  }
  // Return in display order, skipping empty groups
  return order.filter(t => groups[t]?.length).map(t => ({ type: t, drives: groups[t] }));
}

function driveTypeLabel(type) {
  return { Local: 'Local Drives', Network: 'Network Drives', Removable: 'Removable', 'CD-ROM': 'Optical', Unknown: 'Other' }[type] || type;
}

function renderDriveGroups(drives, cardFn, colWidth = '160px') {
  if (drives.length === 0) return `<div style="text-align:center;padding:40px;color:var(--text-muted)">No drives found. Run setup.ps1 to mount drives.</div>`;
  const groups = groupDrivesByType(drives);
  return `<div style="padding:16px;display:flex;flex-direction:column;gap:20px">` +
    groups.map(g => `
      <div>
        <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);font-weight:600;margin-bottom:10px;padding-left:2px">${driveTypeLabel(g.type)}</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(${colWidth},1fr));gap:12px">
          ${g.drives.map(cardFn).join('')}
        </div>
      </div>`).join('') +
  `</div>`;
}

async function explorerShowDrives() {
  explorerPath = null;
  const content = document.getElementById('exp-content');
  const breadcrumb = document.getElementById('exp-breadcrumb');
  if (breadcrumb) breadcrumb.innerHTML = `<span style="color:var(--text-muted);font-size:0.8rem">Drives</span>`;
  document.getElementById('exp-back-btn').disabled = true;
  document.getElementById('exp-back-btn').style.opacity = '0.3';
  content.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:32px">Loading drives...</div>`;

  try {
    const drives = await api('/drives');
    state.drives = drives;
    content.innerHTML = renderDriveGroups(drives, explorerDriveCard, '160px');
  } catch (e) {
    content.innerHTML = `<div style="color:var(--red);text-align:center;padding:32px">${escHtml(e.message)}</div>`;
  }
}

function driveTypeIcon(type) {
  return { Local: '💾', Network: '🌐', Removable: '💿', 'CD-ROM': '💿', Unknown: '📁' }[type] || '📁';
}

function explorerDriveCard(d) {
  const usedPct = d.total_bytes > 0 ? Math.round((d.total_bytes - d.free_bytes) / d.total_bytes * 100) : 0;
  return `
    <div class="drive-card ${d.accessible?'':'inaccessible'}" onclick="${d.accessible ? `explorerNavigate('${d.path}')` : ''}">
      <div style="font-size:1.5rem;margin-bottom:4px;">${driveTypeIcon(d.drive_type)}</div>
      <div style="font-weight:700;font-size:0.9rem;color:var(--text-primary)">${escHtml(d.display)}</div>
      <div style="font-size:0.72rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(d.label)}</div>
      <div style="font-size:0.72rem;color:var(--text-muted)">${d.accessible ? `${d.free_display} free / ${d.total_display}` : 'Inaccessible'}</div>
      ${d.accessible && d.total_bytes > 0 ? `
        <div class="usage-bar">
          <div class="usage-fill" style="width:${usedPct}%;background:${usedPct>90?'var(--red)':usedPct>70?'var(--amber)':'linear-gradient(90deg,var(--cyan),var(--purple))'}"></div>
        </div>
        <div style="font-size:0.68rem;color:var(--text-muted)">${usedPct}% used</div>` : ''}
    </div>`;
}

async function explorerNavigate(path) {
  explorerPath = path;
  const content = document.getElementById('exp-content');
  const backBtn = document.getElementById('exp-back-btn');
  if (backBtn) { backBtn.disabled = false; backBtn.style.opacity = '1'; }
  if (content) content.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:32px">Loading...</div>`;

  try {
    const data = await api('/browse?path=' + encodeURIComponent(path));
    updateExpBreadcrumb(data.path, data.display);
    const items = data.items.filter(i => !i.hidden);

    if (content) {
      content.innerHTML = items.length === 0
        ? `<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:0.85rem;">Empty directory</div>`
        : `<div>${items.map(i => explorerItemRow(i)).join('')}</div>`;
    }
  } catch (e) {
    if (content) content.innerHTML = `<div style="color:var(--red);text-align:center;padding:32px">${escHtml(e.message)}</div>`;
  }
}

function explorerItemRow(item) {
  const icon = item.type === 'dir' ? '📁' : getFileIcon(item.name);
  const isHtmlReport = item.type === 'file' && /\.html?$/i.test(item.name);
  let onclick = '';
  if (item.type === 'dir' && !item.inaccessible) {
    onclick = `onclick="explorerNavigate('${item.path.replace(/'/g, "\\'")}')"`;
  } else if (isHtmlReport) {
    onclick = `onclick="window.open('/api/file?path=${encodeURIComponent(item.path)}','_blank')"`;
  }
  const cursorStyle = item.type === 'dir' ? '' : isHtmlReport ? 'cursor:pointer' : 'cursor:default';
  return `
    <div class="browser-item ${item.type}" ${onclick} style="${cursorStyle}${item.inaccessible?';opacity:0.4;cursor:not-allowed':''}">
      <span style="font-size:1rem;flex-shrink:0">${icon}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.85rem">${escHtml(item.name)}</span>
      ${item.size_display ? `<span style="font-size:0.75rem;color:var(--text-muted);flex-shrink:0">${item.size_display}</span>` : ''}
      ${item.modified ? `<span style="font-size:0.72rem;color:var(--text-muted);flex-shrink:0;min-width:80px;text-align:right">${new Date(item.modified).toLocaleDateString()}</span>` : ''}
    </div>`;
}

function updateExpBreadcrumb(path, display) {
  const bc = document.getElementById('exp-breadcrumb');
  if (!bc) return;
  bc.innerHTML = buildBreadcrumbHtml(path, display, (p) => `explorerNavigate('${p.replace(/'/g, "\\'")}')`);
}

function explorerGoUp() {
  if (!explorerPath) return;
  // Find parent
  const parts = explorerPath.split('/').filter(Boolean);
  if (parts.length <= 2 && explorerPath.startsWith('/mnt/drives/')) {
    explorerShowDrives();
  } else {
    const parent = '/' + parts.slice(0, -1).join('/');
    explorerNavigate(parent);
  }
}

function explorerRefresh() {
  if (explorerPath) explorerNavigate(explorerPath);
  else explorerShowDrives();
}

function explorerGoHome() {
  explorerShowDrives();
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','bmp','webp','heic','tiff'].includes(ext)) return '🖼';
  if (['mp4','mkv','avi','mov','wmv','m4v','flv'].includes(ext)) return '🎬';
  if (['mp3','flac','wav','aac','ogg','m4a'].includes(ext)) return '🎵';
  if (['pdf','doc','docx','txt','xlsx','csv','html','htm'].includes(ext)) return '📄';
  if (['zip','rar','7z','tar','gz'].includes(ext)) return '📦';
  return '📎';
}

function buildBreadcrumbHtml(path, display, onclickFn) {
  // Build segments from path
  const DRIVES_DIR = '/mnt/drives';
  let segments = [];

  if (path.startsWith(DRIVES_DIR)) {
    const rest = path.slice(DRIVES_DIR.length + 1);
    const parts = rest.split('/').filter(Boolean);
    let current = DRIVES_DIR;
    parts.forEach((part, i) => {
      current += '/' + part;
      const captured = current;
      const label = i === 0 ? (part.toUpperCase() + ':\\') : part;
      segments.push({ label, path: captured });
    });
  } else {
    const parts = path.split('/').filter(Boolean);
    let current = '';
    parts.forEach(part => {
      current += '/' + part;
      const captured = current;
      segments.push({ label: part, path: captured });
    });
  }

  if (segments.length === 0) {
    return `<span style="color:var(--text-muted);font-size:0.8rem">Drives</span>`;
  }

  return segments.map((seg, i) => {
    const isLast = i === segments.length - 1;
    const onclick = isLast ? '' : `onclick="${onclickFn(seg.path)}"`;
    return `${i > 0 ? '<span class="breadcrumb-sep">›</span>' : ''}
      <span class="breadcrumb-item${isLast ? '" style="color:var(--text-primary);cursor:default' : ''}" ${onclick}>${escHtml(seg.label)}</span>`;
  }).join('');
}

async function renderJobs() {
  const el = document.getElementById('tab-jobs');
  el.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:40px">Loading...</div>`;

  try {
    const jobs = await api('/jobs?limit=100');
    state.jobs = jobs;
    renderJobsUI(jobs);
  } catch (e) {
    el.innerHTML = `<div style="color:var(--red);text-align:center;padding:40px">${escHtml(e.message)}</div>`;
  }
}

function renderJobsUI(jobs) {
  const el = document.getElementById('tab-jobs');
  const active = jobs.filter(j => j.status === 'running' || j.status === 'pending');
  const history = jobs.filter(j => j.status === 'completed' || j.status === 'failed' || j.status === 'cancelled' || j.status === 'interrupted');

  // Filter pills state
  const filters = ['all', 'completed', 'failed', 'cancelled', 'interrupted'];
  const filterHtml = filters.map(f => `
    <button class="pill ${state.activeJobFilter === f || (f==='all' && !state.activeJobFilter) ? 'pill-running' : 'pill-pending'}"
      style="cursor:pointer;margin-right:4px;" onclick="setJobFilter('${f}')">${f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)}</button>`).join('');

  const filteredHistory = state.activeJobFilter && state.activeJobFilter !== 'all'
    ? history.filter(j => j.status === state.activeJobFilter)
    : history;

  el.innerHTML = `
    <div class="fade-in">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <div>
          <h1 style="font-size:1.4rem;font-weight:700;margin:0 0 4px;">Jobs</h1>
          <p style="color:var(--text-secondary);font-size:0.85rem;margin:0;">${active.length} active, ${history.length} in history</p>
        </div>
        <button class="btn-secondary btn-sm" onclick="renderJobs()">↺ Refresh</button>
      </div>

      ${active.length > 0 ? `
        <div style="margin-bottom:28px;">
          <div class="section-header">Active Jobs</div>
          <div id="active-jobs-list" style="display:flex;flex-direction:column;gap:16px;">
            ${active.map(j => activeJobCard(j)).join('')}
          </div>
        </div>` : ''}

      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div class="section-header" style="margin-bottom:0">Job History</div>
          <div>${filterHtml}</div>
        </div>
        ${filteredHistory.length === 0 ? `<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:0.85rem;">No jobs in history</div>` :
          `<div style="display:flex;flex-direction:column;gap:8px;" id="history-jobs-list">${filteredHistory.map(j => historyJobRow(j)).join('')}</div>`}
      </div>
    </div>`;

  // Connect WebSockets for active jobs
  active.forEach(j => {
    if (!state.jobWS[j.id]) {
      connectJobWS(j.id);
    } else {
      // WS already connected before render completed — sync cached stats/logs to new DOM
      if (state.jobStats[j.id]) {
        updateJobStatsUI(j.id, state.jobStats[j.id]);
      }
    }
  });
}

function setJobFilter(f) {
  state.activeJobFilter = f === 'all' ? null : f;
  renderJobs();
}

function activeJobCard(job) {
  const stats = state.jobStats[job.id] || job.stats || {};
  const phase = stats.phase || 'scanning';
  const phases = ['scanning', 'processing', 'complete'];

  const phaseDots = phases.map(p => {
    let cls = 'phase-dot';
    if (p === phase) cls += ' active';
    else if (phases.indexOf(p) < phases.indexOf(phase) || phase === 'complete') cls += ' done';
    if (phase === 'failed' && p === 'complete') cls = 'phase-dot failed';
    return `<div class="${cls}" title="${p}"></div>`;
  }).join(`<div style="flex:1;height:1px;background:rgba(255,255,255,0.1);max-width:30px"></div>`);

  return `
    <div class="card job-active-card card-glow-cyan" style="padding:20px;" id="job-card-${job.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-weight:600;font-size:0.95rem;margin-bottom:4px;">${SCRIPT_LABELS[job.script] || job.script}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">Started ${relativeTime(job.created_at)} · ID: ${job.id.slice(0,8)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${statusPill(job.status)}
          ${job.status === 'running' || job.status === 'pending' ? `<button class="btn-danger btn-sm" onclick="cancelJob('${job.id}')">Cancel</button>` : ''}
        </div>
      </div>

      <!-- Phase indicator -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <div class="phase-steps">${phaseDots}</div>
        <span style="font-size:0.75rem;color:var(--text-secondary);text-transform:capitalize">${phase}</span>
      </div>

      <!-- Progress bar -->
      <div class="progress-bar ${phase !== 'complete' ? 'progress-indeterminate' : ''}" style="margin-bottom:14px;">
        <div class="progress-fill" style="${phase === 'complete' ? 'width:100%;background:var(--green)' : ''}"></div>
      </div>

      <!-- Stats grid -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;" id="stats-${job.id}">
        ${jobStatMini('Scanned', stats.scanned || 0, 'var(--cyan)')}
        ${jobStatMini('Processed', stats.processed || 0, 'var(--purple)')}
        ${jobStatMini('Moved', stats.moved || 0, 'var(--green)')}
        ${jobStatMini('Errors', stats.errors || 0, stats.errors > 0 ? 'var(--red)' : 'var(--text-muted)')}
      </div>

      <!-- Current file -->
      <div id="current-file-${job.id}" style="font-size:0.72rem;color:var(--text-muted);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px;min-height:14px;">
        ${stats.current_file ? `→ ${escHtml(stats.current_file)}` : ''}
      </div>

      <!-- Live log -->
      <div class="live-log" id="live-log-${job.id}">
        ${(state.jobLogs[job.id] || []).map(l => `<div class="log-line level-${l.level}"><span style="color:var(--text-muted)">${fmtLogTime(l.timestamp)}</span> ${escHtml(l.message)}</div>`).join('')}
      </div>
    </div>`;
}

function jobStatMini(label, value, color) {
  return `
    <div style="background:rgba(0,0,0,0.2);border-radius:8px;padding:8px;text-align:center;">
      <div style="font-size:1.1rem;font-weight:700;color:${color}">${value}</div>
      <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted)">${label}</div>
    </div>`;
}

function historyJobRow(job) {
  const stats = job.stats || {};
  return `
    <div style="padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;" id="history-job-${job.id}">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.85rem;font-weight:500;margin-bottom:2px;">${SCRIPT_LABELS[job.script] || job.script}</div>
          <div style="font-size:0.72rem;color:var(--text-muted);">${relativeTime(job.created_at)}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;font-size:0.75rem;color:var(--text-muted);">
          ${stats.moved > 0 ? `<span style="color:var(--green)">${stats.moved} moved</span>` : ''}

function rerunJob(jobId, script) {
  const job = state.jobs.find(j => j.id === jobId);
  if (job && job.config) {
    saveLS('cfg_' + script, job.config);
  }
  switchTab('scripts');
  setTimeout(() => {
    const panel = document.getElementById('config-' + script);
    if (panel && !panel.classList.contains('open')) {
      toggleScript(script);
    } else if (panel && panel.classList.contains('open')) {
      panel.innerHTML = getConfigRenderer(script)();
      bindConfigEvents(script);
    }
  }, 50);
  toast('Config restored — review and run', 'info');
}

function connectJobWS(jobId) {
  if (state.jobWS[jobId]) return;
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws/${jobId}`);

  if (!state.jobLogs[jobId]) state.jobLogs[jobId] = [];
  if (!state.jobStats[jobId]) state.jobStats[jobId] = {};

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'ping') return;

    if (msg.type === 'init') {
      if (msg.job && msg.job.stats) {
        state.jobStats[jobId] = msg.job.stats;
      }
    }

    if (msg.type === 'log') {
      state.jobLogs[jobId].push(msg);
      if (state.jobLogs[jobId].length > 200) state.jobLogs[jobId].shift();
      appendLiveLog(jobId, msg);
    }

    if (msg.type === 'stats') {
      state.jobStats[jobId] = msg;
      updateJobStatsUI(jobId, msg);
    }

    if (msg.type === 'status') {
      updateJobStatusUI(jobId, msg);
    }

    if (msg.type === 'done') {
      ws.close();
      delete state.jobWS[jobId];
      setTimeout(renderJobs, 500);
    }
  };

  ws.onerror = () => {
    delete state.jobWS[jobId];
  };

  ws.onclose = () => {
    delete state.jobWS[jobId];
  };

  state.jobWS[jobId] = ws;
}

function appendLiveLog(jobId, msg) {
  const el = document.getElementById('live-log-' + jobId);
  if (!el) return;
  const line = document.createElement('div');
  line.className = `log-line level-${msg.level}`;
  line.innerHTML = `<span style="color:var(--text-muted)">${fmtLogTime(msg.timestamp)}</span> ${escHtml(msg.message)}`;
  el.appendChild(line);
  // Keep last 50 lines
  while (el.children.length > 50) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

function updateJobStatsUI(jobId, stats) {
  const statsEl = document.getElementById('stats-' + jobId);
  if (statsEl) {
    statsEl.innerHTML = `
      ${jobStatMini('Scanned', stats.scanned || 0, 'var(--cyan)')}
      ${jobStatMini('Processed', stats.processed || 0, 'var(--purple)')}
      ${jobStatMini('Moved', stats.moved || 0, 'var(--green)')}
      ${jobStatMini('Errors', stats.errors || 0, (stats.errors||0) > 0 ? 'var(--red)' : 'var(--text-muted)')}`;
  }
  const cfEl = document.getElementById('current-file-' + jobId);
  if (cfEl && stats.current_file) {
    cfEl.textContent = '→ ' + stats.current_file;
  }
}

  renderNav();
}

async function fetchLogs(append) {
  const body = document.getElementById('log-table-body');
  if (!body) return;

  if (!append) body.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:32px;font-size:0.85rem">Loading...</div>`;

  let url = `/logs?limit=200&offset=${logsState.offset}`;
  if (logsState.jobId) url += '&job_id=' + encodeURIComponent(logsState.jobId);
  if (logsState.level) url += '&level=' + encodeURIComponent(logsState.level);
  if (logsState.search) url += '&search=' + encodeURIComponent(logsState.search);

  try {
    const logs = await api(url);
    if (!append) {
      logsState.results = logs;
    } else {
      logsState.results = logsState.results.concat(logs);
    }
    logsState.offset += logs.length;

    renderLogsUI();

    const moreBtn = document.getElementById('log-more-btn');
    if (moreBtn) moreBtn.style.display = logs.length === 200 ? '' : 'none';

    const countEl = document.getElementById('log-count');
    if (countEl) countEl.textContent = `${logsState.results.length} entries`;
  } catch (e) {
    if (body) body.innerHTML = `<div style="color:var(--red);text-align:center;padding:32px">${escHtml(e.message)}</div>`;
  }
}

function renderLogsUI() {
  const body = document.getElementById('log-table-body');
  if (!body) return;

  if (logsState.results.length === 0) {
    body.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:32px;font-size:0.85rem">No logs found</div>`;
    return;
  }

  body.innerHTML = logsState.results.map(l => {
    const ts = fmtLogDateTime(l.timestamp);
    const rowBg = l.level === 'ERROR' ? 'background:rgba(255,68,68,0.04)' : l.level === 'WARN' ? 'background:rgba(255,184,0,0.03)' : '';
    const borderLeft = l.level === 'ERROR' ? 'border-left:2px solid var(--red)' : l.level === 'WARN' ? 'border-left:2px solid var(--amber)' : l.level === 'DRY' ? 'border-left:2px solid var(--purple)' : '';
    return `
      <div style="display:grid;grid-template-columns:140px 60px 130px 1fr;gap:0;padding:6px 16px;border-bottom:1px solid rgba(255,255,255,0.02);${rowBg};${borderLeft}">
        <span style="font-size:0.72rem;color:var(--text-muted);font-family:monospace">${ts}</span>
        <span class="level-${l.level}" style="font-size:0.72rem;font-weight:600">${l.level}</span>

        <span style="font-size:0.72rem;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(l.message)}</span>
      </div>`;
  }).join('');

  try {
    const data = await api('/browse?path=' + encodeURIComponent(path));

              return `

    return;
  }

  if (state.browserMode === 'df-add-source') {
    if (!state.dfSources.includes(path)) {
      state.dfSources.push(path);
      // Re-render the sources list
      const sourcesList = document.getElementById('df-sources-list');
      if (sourcesList) {
        sourcesList.innerHTML = state.dfSources.map((s, i) => `
          <div class="source-item">
            <span style="font-size:0.7rem;font-weight:700;color:var(--purple);min-width:20px">P${i+1}</span>
            <span style="flex:1;font-size:0.82rem;font-family:monospace;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(containerToDisplay(s))}</span>
            <button class="btn-icon btn-sm" onclick="dfRemoveSource(${i})">✕</button>
          </div>`).join('');
      }
      toast('Source added', 'success');
    } else {
      toast('Source already added', 'info');
    }
  } else if (state.browserTarget) {
    const input = document.getElementById(state.browserTarget);
    if (input) input.value = path;
  }

  closeBrowser();
}

// =====================================================================
// POLLING
// =====================================================================
let pollInterval = null;

function startPolling() {
  if (pollInterval) return;
  pollInterval = setInterval(async () => {
    try {
      const jobs = await api('/jobs?limit=100');
      state.jobs = jobs;
      // Update nav indicators
      renderNav();
      // If on dashboard, refresh
      if (state.activeTab === 'dashboard') renderDashboard();
      // Connect WS for any new running jobs
      jobs.filter(j => j.status === 'running' || j.status === 'pending').forEach(j => {
        if (!state.jobWS[j.id]) connectJobWS(j.id);
      });
    } catch {}
  }, 5000);
}

// =====================================================================
// INIT
// =====================================================================
document.addEventListener('DOMContentLoaded', async () => {
  // Render navigation
  renderNav();

  // Check initial saved tab
  const savedTab = loadLS('activeTab', 'dashboard');
  state.activeTab = savedTab;

  // Show the correct tab
  TABS.forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) {
      if (t === savedTab) el.classList.remove('hidden');
      else el.classList.add('hidden');
    }
  });

  renderNav();

  // Check API status
  await checkApiStatus();

  // Render initial tab
  renderTab(state.activeTab);

  // Start polling
  startPolling();

  // Re-check API every 30s
  setInterval(checkApiStatus, 30000);

  // Keyboard support for browser modal
  document.addEventListener('keydown', (e) => {
    const modal = document.getElementById('browser-modal');
    if (!modal.classList.contains('hidden')) {
      if (e.key === 'Escape') closeBrowser();
      if (e.key === 'Enter') browserSelectFolder();
      if (e.key === 'Backspace') {
        e.preventDefault();
        if (state.browserPath) {
          const parts = state.browserPath.split('/').filter(Boolean);
          if (parts.length <= 2) browserShowDrives();
          else browserNavigate('/' + parts.slice(0, -1).join('/'));
        }
      }
    }
  });
});
</script>
